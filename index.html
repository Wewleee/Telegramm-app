<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Эта строка критически важна для мобильных: -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мои Дела</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Сброс отступов для мобильного вида */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 16px; 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color);
        }

        h1 { margin-bottom: 20px; font-size: 24px; text-align: center; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc;
            background: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-text-color);
        }

        button { 
            width: 100%; padding: 14px; background: var(--tg-theme-button-color); 
            color: var(--tg-theme-button-text-color); border: none; border-radius: 12px; 
            font-weight: bold; font-size: 16px;
        }

        ul { list-style: none; margin-top: 20px; }
        li { 
            background: var(--tg-theme-secondary-bg-color); margin-bottom: 10px; 
            padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; 
        }
        
        .done { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>
    <h1>Мои Цели</h1>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="Что нужно сделать?">
        <input type="datetime-local" id="todoDate">
    </div>
    <button onclick="addTodo()">Добавить дело</button>
    <ul id="todoList"></ul>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Принудительно открываем приложение на весь экран

        // (Логика сохранения остается прежней, см. прошлый код)
        // ... (вставь сюда ту же функцию window.onload и saveTodos, что мы делали раньше)
    </script>
</body>
</html>
