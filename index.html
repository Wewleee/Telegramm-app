<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Планировщик</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-radius: 5px; color: black; }
    </style>
</head>
<body>
    <h1>Мои дела</h1>
    <input type="text" id="todoInput" placeholder="Что нужно сделать?">
    <button onclick="addTodo()">Добавить</button>
    <ul id="todoList"></ul>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        
        function addTodo() {
            let input = document.getElementById('todoInput');
            if (input.value) {
                let li = document.createElement('li');
                li.innerText = input.value;
                document.getElementById('todoList').appendChild(li);
                input.value = '';
            }
        }
    </script>
</body>
</html>
