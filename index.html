<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Планировщик</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; }
        ul { list-style: none; padding: 0; }
        li { background: var(--tg-theme-secondary-bg-color); margin: 8px 0; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        .done { text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>
    <h1>Дела</h1>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="Что сделать?">
        <input type="datetime-local" id="todoDate">
    </div>
    <button onclick="addTodo()">Добавить</button>
    <ul id="todoList"></ul>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        let todoListElement = document.getElementById('todoList');

        // Загружаем данные при открытии приложения
        window.onload = function() {
            let savedTodos = localStorage.getItem('myTodos');
            if (savedTodos) {
                todoListElement.innerHTML = savedTodos;
            }
        };

        function addTodo() {
            let text = document.getElementById('todoInput').value;
            let date = document.getElementById('todoDate').value;
            if (!text) return;

            let li = document.createElement('li');
            li.innerHTML = `<input type="checkbox" onchange="saveAndToggle(this)"> 
                            <span>${text} <br><small>${date.replace('T', ' ')}</small></span>`;
            
            todoListElement.appendChild(li);
            document.getElementById('todoInput').value = '';
            saveTodos(); // Сохраняем после добавления
        }

        function saveAndToggle(checkbox) {
            checkbox.nextElementSibling.classList.toggle('done');
            saveTodos(); // Сохраняем после изменения статуса
        }

        function saveTodos() {
            localStorage.setItem('myTodos', todoListElement.innerHTML);
        }
    </script>
</body>
</html>
