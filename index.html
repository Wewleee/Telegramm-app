<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мои Дела</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; padding: 16px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ccc; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
        button { width: 100%; padding: 14px; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 12px; font-weight: bold; }
        ul { list-style: none; margin-top: 20px; }
        li { background: var(--tg-theme-secondary-bg-color); margin-bottom: 10px; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; }
        .done { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>
    <h1>Мои Цели</h1>
    <div class="input-group">
        <input type="text" id="todoInput" placeholder="Что нужно сделать?">
        <input type="datetime-local" id="todoDate">
    </div>
    <button onclick="addTodo()">Добавить дело</button>
    <ul id="todoList"></ul>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        let todoListElement = document.getElementById('todoList');

        window.onload = function() {
            let savedTodos = localStorage.getItem('myTodos');
            if (savedTodos) { todoListElement.innerHTML = savedTodos; }
        };

        function addTodo() {
            let text = document.getElementById('todoInput').value;
            let date = document.getElementById('todoDate').value;
            if (!text) return;

            let li = document.createElement('li');
            li.innerHTML = `<input type="checkbox" onchange="saveAndToggle(this)"> 
                            <span>${text} <br><small>${date.replace('T', ' ')}</small></span>`;
            
            todoListElement.appendChild(li);
            document.getElementById('todoInput').value = '';
            saveTodos();
        }

        function saveAndToggle(checkbox) {
            checkbox.nextElementSibling.classList.toggle('done');
            saveTodos();
        }

        function saveTodos() {
            localStorage.setItem('myTodos', todoListElement.innerHTML);
        }
    </script>
</body>
</html>
